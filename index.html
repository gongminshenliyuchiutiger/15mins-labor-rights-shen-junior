<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新北市國中勞動權益15分鐘微課程模組系統</title>
    
    <!-- 引入 Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- 自定義樣式 -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>新北市國中勞動權益15分鐘微課程模組系統</h1>
        <p class="subtitle">成為勞權神，不再只是夢想！</p>
    </header>

    <div class="controls-wrapper">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="搜尋課程標題、關鍵字或教學目標...">
        </div>
        <div class="filter-group">
            <button class="filter-btn active" data-filter="all">全部模組</button>
            <button class="filter-btn" data-filter="individual">個體勞動</button>
            <button class="filter-btn" data-filter="collective">集體勞動</button>
        </div>
    </div>

    <main>
        <h2 class="section-title" id="individual-section-title"><i class="fa-solid fa-user" style="color: var(--individual);"></i> 個體勞動模組 (Individual Labor)</h2>
        <div class="grid" id="grid-individual"></div>

        <h2 class="section-title" id="collective-section-title"><i class="fa-solid fa-users" style="color: var(--collective);"></i> 集體勞動模組 (Collective Labor)</h2>
        <div class="grid" id="grid-collective"></div>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="close-modal"><i class="fa-solid fa-xmark"></i></div>
            <div id="modalBody"></div>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <p class="footer-reference">參考資料：<i class="fa-solid fa-book"></i> 新北市國中勞動權益課程教材</p>
            <a href="https://www.facebook.com/happyliyuchilltiger" target="_blank" class="fb-link-btn">
                <i class="fa-brands fa-facebook"></i> 快樂鯉魚秋老虎
            </a>
        </div>
        <p class="copyright">Copyright © Liyuchiutiger Gongminshen</p>
    </footer>

    <!-- 互動吉祥物 -->
    <div id="mascot" title="拖曳我！">
        <img src="image/LiyuChillGuy.svg" alt="Mascot">
    </div>

    <!-- 簡報模式覆蓋層 -->
    <div id="presentation-overlay" class="presentation-overlay hidden">
        <div class="presentation-controls">
            <span id="slide-counter" class="slide-counter">1 / 1</span>
            <button class="close-presentation" id="closePresentationBtn" title="退出簡報模式 (Esc)"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <button class="nav-btn prev-btn" id="prevSlideBtn" title="上一頁 (左箭頭)"><i class="fa-solid fa-chevron-left"></i></button>
        <div id="slide-container" class="slide-container">
            <!-- 投影片內容將由 JS 生成 -->
        </div>
        <button class="nav-btn next-btn" id="nextSlideBtn" title="下一頁 / 顯示解答 (右箭頭/空白鍵)"><i class="fa-solid fa-chevron-right"></i></button>
    </div>

    <!-- 益智問答比賽覆蓋層 -->
    <div id="game-overlay" class="game-overlay hidden">
        <div class="game-header">
            <div class="game-stats">
                <div class="stat-item"><i class="fa-solid fa-heart" id="game-lives"></i> <span id="lives-count">3</span></div>
                <div class="stat-item"><i class="fa-solid fa-star" style="color: #ffca28;"></i> <span id="game-score">0000</span></div>
            </div>
            <div id="game-progress-text" style="color: white; font-weight: 800; letter-spacing: 1px;">題號 1 / 3</div>
            <button class="close-game" id="closeGameBtn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        
        <div id="game-main" class="game-main">
            <!-- 遊戲計時條 -->
            <div class="timer-bar-container">
                <div id="timer-bar" class="timer-bar"></div>
            </div>

            <div id="game-question-box" class="game-question-box">
                <!-- 題目與選項將由 JS 生成 -->
            </div>

            <!-- 答案解析框 (預設隱藏) -->
            <div id="game-explanation" class="game-explanation hidden">
                <div class="exp-title"><i class="fa-solid fa-shield-halved"></i> 權益解析</div>
                <div id="exp-content" class="exp-content"></div>
                <button id="nextGameSlideBtn" class="game-btn-next">進入下一題 <i class="fa-solid fa-arrow-right"></i></button>
            </div>
        </div>

        <!-- 遊戲結算畫面 (預設隱藏) -->
        <div id="game-result" class="game-result hidden">
            <div id="result-mascot"></div>
            <h2 id="result-title">挑戰結束！</h2>
            <div class="result-score-box">
                <div style="font-size: 1rem; opacity: 0.8;">最終得分</div>
                <div id="total-score" style="font-size: 3.5rem; font-weight: 900; color: #ffca28;">2400</div>
            </div>
            <div id="result-rank" class="result-rank">勞權學徒</div>
            <button id="retryGameBtn" class="game-btn-retry">再次挑戰</button>
            <button id="exitGameBtn" class="game-btn-exit">回課程清單</button>
        </div>
    </div>

    <!-- 核心邏輯 -->
    <script src="script.js"></script>
</body>
</html>
