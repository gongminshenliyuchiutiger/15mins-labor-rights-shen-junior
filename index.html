<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新北市國中勞動權益15分鐘微課程模組系統</title>
    
    <!-- 引入 Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- 自定義樣式 -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>新北市國中勞動權益15分鐘微課程模組系統</h1>
        <p class="subtitle">成為勞權神，不再只是夢想！</p>
    </header>

    <div class="controls-wrapper">
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="searchInput" placeholder="搜尋課程標題、關鍵字或教學目標...">
        </div>
        <div class="filter-group">
            <button class="filter-btn active" data-filter="all">全部模組</button>
            <button class="filter-btn" data-filter="individual">個體勞動</button>
            <button class="filter-btn" data-filter="collective">集體勞動</button>
        </div>
    </div>

    <main>
        <div class="grid" id="grid">
            <!-- 課程卡片將由 JS 生成 -->
        </div>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="close-modal"><i class="fa-solid fa-xmark"></i></div>
            <div id="modalBody"></div>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <p class="footer-reference">參考資料：<i class="fa-solid fa-book"></i> 新北市國中勞動權益課程教材</p>
            <a href="https://www.facebook.com/happyliyuchilltiger" target="_blank" class="fb-link-btn">
                <i class="fa-brands fa-facebook"></i> 快樂鯉魚秋老虎
            </a>
        </div>
        <p class="copyright">Copyright © Liyuchiutiger Gongminshen</p>
    </footer>

    <!-- 互動吉祥物 -->
    <div id="mascot" title="拖曳我！">
        <img src="image/LiyuChillGuy.svg" alt="Mascot">
    </div>

    <!-- 核心邏輯 -->
    <script src="script.js"></script>
</body>
</html>
